server:
  port: 8085

spring:
  main:
    # Essential to allow custom SecurityConfig to override common-lib beans
    allow-bean-definition-overriding: true
  application:
    name: vehicle-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/vehicle_db}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:root}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: true
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

supabase:
  jwt:
    secret: ${SUPABASE_JWT_SECRET:your-secret-key}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

file:
  upload-dir: "E:/travel-plan-platform/travel-plan-uploads/"