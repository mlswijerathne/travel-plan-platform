# Production overrides — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  # ── Caddy HTTPS reverse proxy (auto-SSL via Let's Encrypt) ──
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
      - CORS_ORIGIN=${CORS_ORIGIN:-https://travel-plan.live}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - travel-plan-network
    depends_on:
      api-gateway:
        condition: service_healthy
    restart: unless-stopped

  kafka-ui:
    # Don't expose Kafka UI publicly in prod
    ports: !reset []

  api-gateway:
    # Only Caddy reaches the gateway via Docker network — no host port
    ports: !reset []
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - SUPABASE_URL=${SUPABASE_URL}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    restart: unless-stopped

  discovery-server:
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    restart: unless-stopped

  tourist-service:
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - AZURE_STORAGE_CONNECTION_STRING=${AZURE_STORAGE_CONNECTION_STRING}
    restart: unless-stopped

  hotel-service:
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    restart: unless-stopped

  tour-guide-service:
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    restart: unless-stopped

  vehicle-service:
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - APP_BASE_URL=https://${DOMAIN:-api.travel-plan.live}
    restart: unless-stopped

  booking-service:
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    restart: unless-stopped

  itinerary-service:
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    restart: unless-stopped

  review-service:
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    restart: unless-stopped

  trip-plan-service:
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    restart: unless-stopped

  event-service:
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    restart: unless-stopped

  ecommerce-service:
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - APP_BASE_URL=https://${DOMAIN:-api.travel-plan.live}
    restart: unless-stopped

  ai-agent-service:
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4.1-mini}
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
