# Production overrides — use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
services:
  kafka-ui:
    # Don't expose Kafka UI publicly in prod
    ports: !reset []

  api-gateway:
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - SUPABASE_URL=${SUPABASE_URL}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS}
    restart: unless-stopped

  discovery-server:
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    restart: unless-stopped

  tourist-service:
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    restart: unless-stopped

  hotel-service:
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    restart: unless-stopped

  tour-guide-service:
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    restart: unless-stopped

  vehicle-service:
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    restart: unless-stopped

  booking-service:
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    restart: unless-stopped

  itinerary-service:
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    restart: unless-stopped

  review-service:
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    restart: unless-stopped

  trip-plan-service:
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    restart: unless-stopped

  event-service:
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    restart: unless-stopped

  ecommerce-service:
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    restart: unless-stopped

  ai-agent-service:
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4.1-mini}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY}
    restart: unless-stopped
