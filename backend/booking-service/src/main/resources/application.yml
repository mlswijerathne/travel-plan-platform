server:
  port: 8086
spring:
  application:
    name: booking-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/booking_db}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 5000

supabase:
  jwt:
    secret: ${SUPABASE_JWT_SECRET:your-secret-key}
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Service URLs for Feign clients
services:
  hotel-url: ${HOTEL_SERVICE_URL:http://localhost:8083}
  tour-guide-url: ${TOUR_GUIDE_SERVICE_URL:http://localhost:8084}
  vehicle-url: ${VEHICLE_SERVICE_URL:http://localhost:8085}
  itinerary-url: ${ITINERARY_SERVICE_URL:http://localhost:8087}

aws:
  region: ${AWS_REGION:ap-south-1}
  sqs:
    queue-url: ${SQS_QUEUE_URL:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
