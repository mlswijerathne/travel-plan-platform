server:
  port: 8086
spring:
  application:
    name: booking-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://ep-misty-king-aiv2kum3.c-4.us-east-1.aws.neon.tech/booking_db?sslmode=require}
    username: ${DATABASE_USERNAME:neondb_owner}
    password: ${DATABASE_PASSWORD:npg_tdOaupSzoX32}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 5000

supabase:
  jwt:
    secret: ${SUPABASE_JWT_SECRET:O7htcXf6lOb4l+Th+tsyhDGq2c+e1mS2uo2Zt2gd6qMClVGPjKwfYdShmva33q3GhJBEtWJIwrkN2DO7P3KF4w==}
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

aws:
  region: ${AWS_REGION:ap-south-1}
  sqs:
    booking-queue-url: ${SQS_BOOKING_QUEUE_URL:}
    notification-queue-url: ${SQS_NOTIFICATION_QUEUE_URL:}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
