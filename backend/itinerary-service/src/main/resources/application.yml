server:
  port: 8087
spring:
  application:
    name: itinerary-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://aws-0-ap-northeast-1.pooler.supabase.com:5432/postgres?sslmode=require&prepareThreshold=0}
    username: ${DATABASE_USERNAME:postgres.azdrclbpnuiijhmnfxtf}
    password: ${DATABASE_PASSWORD:DEA2TravlPlan2026}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: itinerary
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: itinerary
    create-schemas: true
supabase:
  jwt:
    secret: ${SUPABASE_JWT_SECRET:O7htcXf6lOb4l+Th+tsyhDGq2c+e1mS2uo2Zt2gd6qMClVGPjKwfYdShmva33q3GhJBEtWJIwrkN2DO7P3KF4w==}
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

aws:
  sqs:
    booking-events-queue: ${BOOKING_EVENTS_QUEUE:booking-events}
    review-trigger-queue: ${REVIEW_TRIGGER_QUEUE:review-triggers}
  region: ${AWS_REGION:ap-northeast-1}

scheduling:
  trip-completion:
    enabled: true
    cron: ${TRIP_COMPLETION_CRON:0 0 0 * * *}
