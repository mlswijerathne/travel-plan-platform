    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8093/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

volumes:
  kafka-data:

networks:
  travel-plan-network:
    driver: bridge
