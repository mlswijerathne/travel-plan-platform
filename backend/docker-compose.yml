version: '3.8'

services:
  # ── Kafka (KRaft mode, no Zookeeper) ──
  kafka:
    image: confluentinc/cp-kafka:7.7.0
    hostname: kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: travel-plan-kafka-cluster-01
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - travel-plan-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # Kafka topic initialization (runs once then exits)
  kafka-init:
    image: confluentinc/cp-kafka:7.7.0
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Creating Kafka topics...'
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic booking-events --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic booking-events.DLT --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic booking-notifications --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic booking-notifications.DLT --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic trip-completion-events --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic trip-completion-events.DLT --partitions 1 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic rating-update-events --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic rating-update-events.DLT --partitions 1 --replication-factor 1
      echo 'Topics created:'
      kafka-topics --bootstrap-server kafka:9092 --list
      "
    networks:
      - travel-plan-network

  # Kafka UI for development
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: travel-plan-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - travel-plan-network

  # Discovery Server (Eureka) - starts first
  discovery-server:
    build:
      context: .
      dockerfile: discovery-server/Dockerfile
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - travel-plan-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # API Gateway
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    ports:
      - "8060:8060"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - SUPABASE_URL=${SUPABASE_URL}
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      discovery-server:
        condition: service_healthy
    networks:
      - travel-plan-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8060/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 40s

  # Tourist Service
  tourist-service:
    build:
      context: .
      dockerfile: tourist-service/Dockerfile
    ports:
      - "8082:8082"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - SUPABASE_URL=${SUPABASE_URL}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - DATABASE_URL=${TOURIST_DB_URL}
      - DATABASE_USERNAME=${TOURIST_DB_USERNAME}
      - DATABASE_PASSWORD=${TOURIST_DB_PASSWORD}
    depends_on:
      discovery-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - travel-plan-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # Hotel Service
  hotel-service:
    build:
      context: .
      dockerfile: hotel-service/Dockerfile
    ports:
      - "8083:8083"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - SUPABASE_URL=${SUPABASE_URL}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - DATABASE_URL=${HOTEL_DB_URL}
      - DATABASE_USERNAME=${HOTEL_DB_USERNAME}
      - DATABASE_PASSWORD=${HOTEL_DB_PASSWORD}
    depends_on:
      discovery-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - travel-plan-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # Tour Guide Service
  tour-guide-service:
    build:
      context: .
      dockerfile: tour-guide-service/Dockerfile
    ports:
      - "8084:8084"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - SUPABASE_URL=${SUPABASE_URL}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - DATABASE_URL=${TOUR_GUIDE_DB_URL}
      - DATABASE_USERNAME=${TOUR_GUIDE_DB_USERNAME}
      - DATABASE_PASSWORD=${TOUR_GUIDE_DB_PASSWORD}
    depends_on:
      discovery-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - travel-plan-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8084/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # Vehicle Service
  vehicle-service:
    build:
      context: .
      dockerfile: vehicle-service/Dockerfile
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - SUPABASE_URL=${SUPABASE_URL}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - APP_BASE_URL=${VEHICLE_BASE_URL:http://vehicle-service:8085}
      - DATABASE_URL=${VEHICLE_DB_URL}
      - DATABASE_USERNAME=${VEHICLE_DB_USERNAME}
      - DATABASE_PASSWORD=${VEHICLE_DB_PASSWORD}
    depends_on:
      discovery-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - travel-plan-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8085/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # Booking Service
  booking-service:
    build:
      context: .
      dockerfile: booking-service/Dockerfile
    ports:
      - "8086:8086"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - SUPABASE_URL=${SUPABASE_URL}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - DATABASE_URL=${BOOKING_DB_URL}
      - DATABASE_USERNAME=${BOOKING_DB_USERNAME}
      - DATABASE_PASSWORD=${BOOKING_DB_PASSWORD}
    depends_on:
      discovery-server:
        condition: service_healthy
      kafka:
        condition: service_healthy
      hotel-service:
        condition: service_healthy
      tour-guide-service:
        condition: service_started
      vehicle-service:
        condition: service_started
    networks:
      - travel-plan-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8086/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s

  # Itinerary Service
  itinerary-service:
    build:
      context: .
      dockerfile: itinerary-service/Dockerfile
    ports:
      - "8087:8087"
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - EUREKA_URL=http://discovery-server:8761/eureka/
      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - SUPABASE_URL=${SUPABASE_URL}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - DATABASE_URL=${ITINERARY_DB_URL}
      - DATABASE_USERNAME=${ITINERARY_DB_USERNAME}
      - DATABASE_PASSWORD=${ITINERARY_DB_PASSWORD}
    depends_on:
