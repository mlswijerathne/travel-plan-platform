      - SUPABASE_JWT_SECRET=${SUPABASE_JWT_SECRET}
      - SUPABASE_URL=${SUPABASE_URL}
    depends_on:
      discovery-server:
        condition: service_healthy
      hotel-service:
        condition: service_healthy
      tour-guide-service:
        condition: service_started
      vehicle-service:
        condition: service_started
      review-service:
        condition: service_healthy
    networks:
