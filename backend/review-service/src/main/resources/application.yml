server:
  port: 8088
spring:
  application:
    name: review-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://aws-0-ap-northeast-1.pooler.supabase.com:5432/postgres?sslmode=require&prepareThreshold=0}
    username: ${DATABASE_USERNAME:postgres.azdrclbpnuiijhmnfxtf}
    password: ${DATABASE_PASSWORD:DEA2TravlPlan2026}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        default_schema: review
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: review
    create-schemas: true
supabase:
  jwt:
    secret: ${SUPABASE_JWT_SECRET:2057/ms99yxu0Kv+rqqaDmGnZRIUcw1VDfM/26VqinfB3AWnS80sgBWQleqgLxdD2LpXVRZgUfuKQeBk1cujZQ==}
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
aws:
  region: ${AWS_REGION:ap-south-1}
  sqs:
    # Queue that receives review.rating.updated events (consumed by provider services)
    rating-update-queue-url: ${SQS_RATING_UPDATE_QUEUE_URL:}
    # Queue that receives itinerary.trip.completed events (published by itinerary-service)
    trip-completion-queue-url: ${SQS_TRIP_COMPLETION_QUEUE_URL:}
    # Optional local endpoint override (e.g. ElasticMQ for local dev)
    endpoint-override: ${SQS_ENDPOINT_OVERRIDE:}
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
