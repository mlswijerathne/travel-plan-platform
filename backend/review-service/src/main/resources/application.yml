server:
  port: 8088
spring:
  application:
    name: review-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/review_db}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        # Use PostgreSQL dialect so Hibernate generates correct array / JSON SQL
        dialect: org.hibernate.dialect.PostgreSQLDialect
    # Useful during development to inspect generated SQL; set to false in prod
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
supabase:
  jwt:
    secret: ${SUPABASE_JWT_SECRET:your-secret-key}
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
aws:
  region: ${AWS_REGION:ap-south-1}
  sqs:
    # Queue that receives review.rating.updated events (consumed by provider services)
    rating-update-queue-url: ${SQS_RATING_UPDATE_QUEUE_URL:}
    # Queue that receives itinerary.trip.completed events (published by itinerary-service)
    trip-completion-queue-url: ${SQS_TRIP_COMPLETION_QUEUE_URL:}
    # Optional local endpoint override (e.g. ElasticMQ for local dev)
    endpoint-override: ${SQS_ENDPOINT_OVERRIDE:}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
