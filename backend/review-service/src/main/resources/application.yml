server:
  port: 8088
spring:
  application:
    name: review-service
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://ep-misty-king-aiv2kum3.c-4.us-east-1.aws.neon.tech/review_db?sslmode=require}
    username: ${DATABASE_USERNAME:neondb_owner}
    password: ${DATABASE_PASSWORD:npg_tdOaupSzoX32}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
supabase:
  jwt:
    secret: ${SUPABASE_JWT_SECRET:O7htcXf6lOb4l+Th+tsyhDGq2c+e1mS2uo2Zt2gd6qMClVGPjKwfYdShmva33q3GhJBEtWJIwrkN2DO7P3KF4w==}
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
aws:
  region: ${AWS_REGION:ap-south-1}
  sqs:
    # Queue that receives review.rating.updated events (consumed by provider services)
    rating-update-queue-url: ${SQS_RATING_UPDATE_QUEUE_URL:}
    # Queue that receives itinerary.trip.completed events (published by itinerary-service)
    trip-completion-queue-url: ${SQS_TRIP_COMPLETION_QUEUE_URL:}
    # Optional local endpoint override (e.g. ElasticMQ for local dev)
    endpoint-override: ${SQS_ENDPOINT_OVERRIDE:}
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
