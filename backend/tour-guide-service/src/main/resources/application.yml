server:
  port: 8084

spring:
  application:
    name: tour-guide-service
  cloud:
    aws:
      region:
        static: ${AWS_REGION:us-east-1}
      credentials:
        access-key: ${AWS_ACCESS_KEY_ID:test}
        secret-key: ${AWS_SECRET_ACCESS_KEY:test}
      sqs:
        endpoint: ${AWS_SQS_ENDPOINT:http://localhost:4566}
        listener:
          auto-startup: ${AWS_SQS_LISTENER_AUTO_STARTUP:false}
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://aws-0-ap-northeast-1.pooler.supabase.com:5432/postgres?sslmode=require&prepareThreshold=0}
    username: ${DATABASE_USERNAME:postgres.azdrclbpnuiijhmnfxtf}
    password: ${DATABASE_PASSWORD:DEA2TravlPlan2026}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        default_schema: guide
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    schemas: guide
    create-schemas: true

supabase:
  jwt:
    secret: ${SUPABASE_JWT_SECRET:2057/ms99yxu0Kv+rqqaDmGnZRIUcw1VDfM/26VqinfB3AWnS80sgBWQleqgLxdD2LpXVRZgUfuKQeBk1cujZQ==}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

app:
  sqs:
    enabled: ${APP_SQS_ENABLED:false}
    rating-update-queue: ${SQS_RATING_UPDATE_QUEUE:rating-updates-queue}
