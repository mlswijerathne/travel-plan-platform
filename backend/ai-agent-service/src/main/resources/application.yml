server:
  max-http-request-header-size: 65536
  port: 8093

spring:
  application:
    name: ai-agent-service
  main:
    web-application-type: servlet
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  cloud:
    compatibility-verifier:
      enabled: false
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 10000

# Feign service URLs - defaults to localhost for local dev; override with env vars for Docker/prod
feign:
  hotel-service:
    url: ${FEIGN_HOTEL_SERVICE_URL:http://localhost:8083}
  tour-guide-service:
    url: ${FEIGN_TOUR_GUIDE_SERVICE_URL:http://localhost:8084}
  vehicle-service:
    url: ${FEIGN_VEHICLE_SERVICE_URL:http://localhost:8085}
  review-service:
    url: ${FEIGN_REVIEW_SERVICE_URL:http://localhost:8088}
  trip-plan-service:
    url: ${FEIGN_TRIP_PLAN_SERVICE_URL:http://localhost:8089}
  event-service:
    url: ${FEIGN_EVENT_SERVICE_URL:http://localhost:8090}
  ecommerce-service:
    url: ${FEIGN_ECOMMERCE_SERVICE_URL:http://localhost:8091}

supabase:
  url: ${SUPABASE_URL}
  jwt:
    secret: ${SUPABASE_JWT_SECRET}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# OpenAI API Configuration
openai:
  api-key: ${OPENAI_API_KEY:}
  model: ${OPENAI_MODEL:gpt-4.1-mini}

# OpenStreetMap Configuration (Nominatim, OSRM, Overpass - all free, no API key)
osm:
  nominatim-base-url: ${OSM_NOMINATIM_BASE_URL:https://nominatim.openstreetmap.org}
  osrm-base-url: ${OSM_OSRM_BASE_URL:https://router.project-osrm.org}
  overpass-base-url: ${OSM_OVERPASS_BASE_URL:https://overpass-api.de/api}
  user-agent: ${OSM_USER_AGENT:TravelPlanPlatform/1.0}

# Agent Configuration
agent:
  session:
    ttl-minutes: 30
    max-history: 50

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

logging:
  level:
    dev.langchain4j: DEBUG
    com.travelplan.aiagent: DEBUG
    org.springframework.cloud.openfeign: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
