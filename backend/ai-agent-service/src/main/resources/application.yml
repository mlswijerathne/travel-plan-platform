server:
  port: 8093

spring:
  application:
    name: ai-agent-service
  cloud:
    openfeign:
      client:
        config:
          default:
            connectTimeout: 5000
            readTimeout: 10000

supabase:
  jwt:
    secret: ${SUPABASE_JWT_SECRET:your-secret-key}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

# Gemini API Configuration
gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.0-flash}
  max-tokens: 4096

# Google Maps Platform Configuration
google:
  maps:
    api-key: ${GOOGLE_MAPS_API_KEY:}
    base-url: ${GOOGLE_MAPS_BASE_URL:https://maps.googleapis.com/maps/api}

# Agent Configuration
agent:
  session:
    ttl-minutes: 30
    max-history: 50

# Service URLs for Feign clients
services:
  hotel-url: ${HOTEL_SERVICE_URL:http://localhost:8083}
  tour-guide-url: ${TOUR_GUIDE_SERVICE_URL:http://localhost:8084}
  vehicle-url: ${VEHICLE_SERVICE_URL:http://localhost:8085}
  review-url: ${REVIEW_SERVICE_URL:http://localhost:8088}
  trip-plan-url: ${TRIP_PLAN_SERVICE_URL:http://localhost:8089}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
