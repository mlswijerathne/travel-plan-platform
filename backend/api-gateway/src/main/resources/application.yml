server:
  port: 8060

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials Access-Control-Allow-Methods Access-Control-Allow-Headers, RETAIN_FIRST
      routes:
        # Tourist Service
        - id: tourist-service
          uri: lb://tourist-service
          predicates:
            - Path=/api/tourists/**

        # Hotel Service
        - id: hotel-service
          uri: lb://hotel-service
          predicates:
            - Path=/api/hotels/**

        # Hotel Rooms
        - id: hotel-rooms
          uri: lb://hotel-service
          predicates:
            - Path=/api/rooms/**

        # Tour Guide Service
        - id: tour-guide-service
          uri: lb://tour-guide-service
          predicates:
            - Path=/api/tour-guides/**

        # Vehicle Service
        - id: vehicle-service
          uri: lb://vehicle-service
          predicates:
            - Path=/api/vehicles/**

        # Booking Service
        - id: booking-service
          uri: lb://booking-service
          predicates:
            - Path=/api/bookings/**

        # Itinerary Service
        - id: itinerary-service
          uri: lb://itinerary-service
          predicates:
            - Path=/api/itineraries/**

        # Review Service
        - id: review-service
          uri: lb://review-service
          predicates:
            - Path=/api/reviews/**

        # Trip Plan Service
        - id: trip-plan-service
          uri: lb://trip-plan-service
          predicates:
            - Path=/api/trip-plans/**,/api/packages/**

        # Event Service
        - id: event-service
          uri: lb://event-service
          predicates:
            - Path=/api/events/**

        # E-Commerce Service
        - id: ecommerce-service
          uri: lb://ecommerce-service
          predicates:
            - Path=/api/products/**,/api/orders/**

        # AI Agent Service (direct URL - Eureka disabled due to WebFlux conflict)
        - id: ai-agent-service
          uri: http://localhost:8093
          predicates:
            - Path=/api/chat/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

supabase:
  url: ${SUPABASE_URL}
  jwt:
    secret: ${SUPABASE_JWT_SECRET}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
