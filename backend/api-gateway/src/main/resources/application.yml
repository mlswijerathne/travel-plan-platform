server:
  port: 8060

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webflux:
          discovery:
            locator:
              enabled: false
      routes:
        # Tourist Service
        - id: tourist-service
          uri: lb://tourist-service
          predicates:
            - Path=/api/tourists/**

        # Hotel Service
        - id: hotel-service
          uri: lb://hotel-service
          predicates:
            - Path=/api/hotels/**

        # Tour Guide Service
        - id: tour-guide-service
          uri: lb://tour-guide-service
          predicates:
            - Path=/api/tour-guides/**

        # Vehicle Service
        - id: vehicle-service
          uri: lb://vehicle-service
          predicates:
            - Path=/api/vehicles/**

        # Booking Service
        - id: booking-service
          uri: lb://booking-service
          predicates:
            - Path=/api/bookings/**

        # Itinerary Service
        - id: itinerary-service
          uri: lb://itinerary-service
          predicates:
            - Path=/api/itineraries/**

        # Review Service
        - id: review-service
          uri: lb://review-service
          predicates:
            - Path=/api/reviews/**

        # Trip Plan Service
        - id: trip-plan-service
          uri: lb://trip-plan-service
          predicates:
            - Path=/api/trip-plans/**,/api/packages/**

        # Event Service
        - id: event-service
          uri: lb://event-service
          predicates:
            - Path=/api/events/**

        # E-Commerce Service
        - id: ecommerce-service
          uri: lb://ecommerce-service
          predicates:
            - Path=/api/products/**,/api/orders/**

        # AI Agent Service
        - id: ai-agent-service
          uri: lb://ai-agent-service
          predicates:
            - Path=/api/chat/**

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

supabase:
  jwt:
    secret: ${SUPABASE_JWT_SECRET:your-secret-key}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
