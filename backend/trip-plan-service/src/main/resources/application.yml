server:
  port: 8089
spring:
  application:
    name: trip-plan-service
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 5
      minimum-idle: 1
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
supabase:
  url: ${SUPABASE_URL}
  jwt:
    secret: ${SUPABASE_JWT_SECRET}
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000}
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

openapi:
  info:
    title: "Trip Plan Service API"
    description: "Admin-curated pre-built travel packages with bundle pricing and availability management"
    version: "1.0.0"
