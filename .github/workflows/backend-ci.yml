name: Backend CI/CD — Azure VM

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build all modules (skip tests on PR)
        if: github.event_name == 'pull_request'
        run: mvn clean package -DskipTests -B

      - name: Build & test all modules
        if: github.event_name == 'push'
        run: mvn clean verify -B

  deploy:
    name: Deploy to Azure VM
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: azureuser
          key: ${{ secrets.VM_SSH_PRIVATE_KEY }}
          command_timeout: 45m
          script: |
            set -e
            cd /opt/travel-plan
            git fetch origin main
            git reset --hard origin/main
            cd backend
            export COMPOSE_PARALLEL_LIMIT=2
            docker compose -f docker-compose.yml -f docker-compose.prod.yml build 2>&1 | tail -5
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --remove-orphans 2>&1 | tail -5
            docker image prune -f
            echo "Deploy complete. Containers:"
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps --format 'table {{.Name}}\t{{.Status}}' 2>&1
